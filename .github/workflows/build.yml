name: Build APK with Docker

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:v0.0.2

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Build APK
      run: |
        buildozer android debug
      
    - name: List files
      run: |
        ls -la ./bin/ || echo "bin folder not found"
        find . -name "*.apk" 2>/dev/null || echo "no apk found"
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: router-killer-apk
        path: ./bin/*.apk
      continue-on-error: true
      
    - name: Fallback upload
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: all-files
        path: .
