name: Build APK with Docker

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: enricostn/docker-buildozer:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Build APK
      run: |
        buildozer android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: router-killer-apk
        path: /home/user/hostaction/bin/*.apk
      continue-on-error: true
      
    - name: Fallback find APK
      if: always()
      run: |
        find / -name "*.apk" 2>/dev/null
        ls -la /home/user/hostaction/bin/ || echo "not found"
        
    - name: Upload fallback
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: all-files
        path: .
